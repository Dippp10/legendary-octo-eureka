name: Update README Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update README
        run: |
          mkdir -p profile
          echo "Updating stats" > profile/stats.svg

      - name: Commit changes
        run: |
          git config --global user.name "Dippp10"
          git config --global user.email "deepikakarthik697@gmail.com"
          git add .
          git commit -m "Update README cards" || echo "No changes"

      - name: Push changes
        run: |
          git push
